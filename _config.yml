# Blog Automation Jekyll Configuration
# =====================================

# ─── Basic Site Info ────────────────────────────────────────────
title: "Tech & Knowledge"
description: "A curated repository bridging software engineering logbooks, scientific curiosity, and general trivia in Korean and English."
baseurl: "/blog_automation"  # Leave empty if no subdirectory; otherwise use "/repo-name"
url: "https://ethanpark0726.github.io"  # Replace with your actual URL: "https://username.github.io"
author:
  name: "The Knowledge Logbook"
  email: "blog@example.com"

# ─── Language Settings ─────────────────────────────────────────
lang: "ko"
timezone: Asia/Seoul

# ─── Jekyll Build Settings ─────────────────────────────────────
theme: minima
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# ─── Plugins ───────────────────────────────────────────────────
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ─── Post Settings ─────────────────────────────────────────────
permalink: /:categories/:year/:month/:day/:title/

# ─── Collections (Multilingual Support) ────────────────────────
defaults:
  - scope:
      path: "_posts/ko"
    values:
      layout: post
      lang: ko
  - scope:
      path: "_posts/en"
    values:
      layout: post
      lang: en

# ─── Excluded Files ────────────────────────────────────────────
exclude:
  - scripts/
  - cloudflare-worker/
  - .github/
  - "*.py"
  - "*.sh"
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - _knowledge/
  - _ideas/
  - _reviews/
  - _inbox/
  - _templates/
  - OBSIDIAN_IMPLEMENTATION_PLAN.md
  - OBSIDIAN_INTEGRATION_CHECKLIST.md
  - OBSIDIAN_PHASE2_STABILIZATION_PLAN.md
  - tistory_sync_plan.md
