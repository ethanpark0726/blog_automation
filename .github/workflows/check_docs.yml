name: 📋 Docs Update Enforcer

# Automatically checks that README and CHANGELOG are also updated whenever
# code, scripts, or configuration files are changed.
#
# Operational content is exempt:
# - _posts/: generated blog posts
# - _knowledge/: generated Obsidian notes
# - _reviews/: review-note inputs and completed revision records

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-docs:
    name: 📋 Check README & CHANGELOG Updated
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Detect Changed Files
        id: changes
        run: |
          git config core.quotePath false
          echo "=== Changed File List ==="
          git diff --name-only HEAD~1 HEAD || git diff --name-only HEAD

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)

          DOC_REQUIRED_CHANGES=$(echo "$CHANGED" \
            | grep -v '^_posts/' \
            | grep -v '^_knowledge/' \
            | grep -v '^_reviews/' \
            | grep -v '^\.git' || true)
          README_CHANGED=$(echo "$CHANGED" | grep -c 'README.md' || true)
          CHANGELOG_CHANGED=$(echo "$CHANGED" | grep -c 'CHANGELOG.md' || true)

          echo "doc_required_changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DOC_REQUIRED_CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "readme_changed=$README_CHANGED" >> "$GITHUB_OUTPUT"
          echo "changelog_changed=$CHANGELOG_CHANGED" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Analysis Results ==="
          echo "Doc-required changed files: $(echo "$DOC_REQUIRED_CHANGES" | grep -c . || true)"
          echo "README updated: $README_CHANGED"
          echo "CHANGELOG updated: $CHANGELOG_CHANGED"

      - name: ✅ Enforce Docs Update Rule
        run: |
          git config core.quotePath false
          CHANGED="${{ steps.changes.outputs.doc_required_changes }}"
          README_CHANGED="${{ steps.changes.outputs.readme_changed }}"
          CHANGELOG_CHANGED="${{ steps.changes.outputs.changelog_changed }}"

          if [ -z "$(echo "$CHANGED" | tr -d '[:space:]')" ]; then
            echo "Operational content-only commit: skipping docs update check"
            exit 0
          fi

          echo "=== Changed Files Requiring Docs ==="
          echo "$CHANGED"
          echo ""

          FAILED=0

          if [ "$README_CHANGED" = "0" ]; then
            echo "❌ README.md has not been updated!"
            FAILED=1
          else
            echo "✅ README.md update confirmed"
          fi

          if [ "$CHANGELOG_CHANGED" = "0" ]; then
            echo "❌ CHANGELOG.md has not been updated!"
            FAILED=1
          else
            echo "✅ CHANGELOG.md update confirmed"
          fi

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚨 [Rule Violation] When changing code or config, README and CHANGELOG"
            echo "   must be updated at the same time."
            echo ""
            echo "   How to update:"
            echo "   1. Add a new version entry to CHANGELOG.md (bugfix: patch +0.0.1)"
            echo "   2. Update the version badge and current version section in README.md"
            echo "   3. Verify and update the Roadmap section in README.md if appropriate"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "🎉 All documentation update rules have been followed!"

      - name: 🏷️ Validate README Version Metadata
        run: python scripts/check_version_metadata.py
