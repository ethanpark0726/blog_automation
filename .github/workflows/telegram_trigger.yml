name: 🤖 Telegram Blog Automation

on:
  workflow_dispatch:
    inputs:
      query_input:
        description: 'Blog topic or question received from Telegram'
        required: true
        type: string
      chat_id:
        description: 'Telegram chat ID (for completion notification)'
        required: false
        type: string

jobs:
  generate-and-deploy:
    name: Generate & Deploy Blog Post
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      # ── 1. Repository Checkout ────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # ── 2. Python Environment Setup ────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Dependencies ──────────────────────────────
      - name: 📦 Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run Gemini Runtime Tests (No API Calls)
        run: |
          python -m unittest discover -s tests -v

      - name: ♻️ Restore Failed-Run Checkpoint
        uses: actions/cache/restore@v4
        with:
          path: .pipeline_cache
          key: pipeline-checkpoint-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            pipeline-checkpoint-${{ github.run_id }}-

      # ── 4. Run Multi-Agent ──────────────────────────────────
      - name: ✍️ Run Multi-Agent (Writer + Editor)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QUERY_INPUT: ${{ github.event.inputs.query_input }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL }}
        run: |
          python scripts/multi_agent.py

      # ── 5. Git Configuration ────────────────────────────────
      - name: 🔧 Configure Git
        run: |
          git config --global user.email "blog-bot@github-actions.com"
          git config --global user.name "Blog Automation Bot 🤖"

      # ── 6. Check Changes and Commit ───────────────────────────
      - name: 📝 Commit New Posts
        run: |
          git add _posts/
          if git diff --staged --quiet; then
            echo "No new files to commit."
          else
            COMMIT_MSG="feat: add post from Telegram (ko/en) - $(date +'%Y-%m-%d %H:%M:%S')"
            git commit -m "$COMMIT_MSG"
          fi
          echo "PAGES_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      # ── 7. Push to Remote Repository ─────────────────────────
      - name: 🚀 Push to GitHub
        run: |
          git push origin main

      - name: Wait for GitHub Pages Deployment
        if: success()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_COMMIT_SHA: ${{ env.PAGES_COMMIT_SHA }}
        run: |
          python scripts/pages_status.py

      - name: 🧹 Clear Successful Checkpoint
        if: success()
        run: |
          python -c "import shutil; shutil.rmtree('.pipeline_cache', ignore_errors=True)"

      - name: 💾 Save Failed-Run Checkpoint
        if: failure()
        uses: actions/cache/save@v4
        with:
          path: .pipeline_cache
          key: pipeline-checkpoint-${{ github.run_id }}-${{ github.run_attempt }}

      # ── 8. Telegram Completion Notification ─────────────────
      - name: 📩 Send Telegram Completion Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          JOB_STATUS: ${{ job.status }}
          QUERY_INPUT: ${{ github.event.inputs.query_input }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/notify.py

      - name: Publish Operations Summary
        if: always()
        run: |
          python scripts/operations_summary.py
