name: 🤖 Telegram Blog Automation

on:
  workflow_dispatch:
    inputs:
      query_input:
        description: 'Blog topic or question received from Telegram'
        required: true
        type: string
      chat_id:
        description: 'Telegram chat ID (for completion notification)'
        required: false
        type: string

jobs:
  generate-and-deploy:
    name: Generate & Deploy Blog Post
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Repository Checkout ────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # ── 2. Python Environment Setup ────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Dependencies ──────────────────────────────
      - name: 📦 Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      # ── 4. Run Multi-Agent ──────────────────────────────────
      - name: ✍️ Run Multi-Agent (Writer + Editor)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QUERY_INPUT: ${{ github.event.inputs.query_input }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python scripts/multi_agent.py

      # ── 5. Git Configuration ────────────────────────────────
      - name: 🔧 Configure Git
        run: |
          git config --global user.email "blog-bot@github-actions.com"
          git config --global user.name "Blog Automation Bot 🤖"

      # ── 6. Check Changes and Commit ───────────────────────────
      - name: 📝 Commit New Posts
        run: |
          git add _posts/
          if git diff --staged --quiet; then
            echo "No new files to commit."
          else
            COMMIT_MSG="feat: add post from Telegram (ko/en) - $(date +'%Y-%m-%d %H:%M:%S')"
            git commit -m "$COMMIT_MSG"
          fi

      # ── 7. Push to Remote Repository ─────────────────────────
      - name: 🚀 Push to GitHub
        run: |
          git push origin main

      # ── 8. Telegram Completion Notification ─────────────────
      - name: 📩 Send Telegram Completion Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          JOB_STATUS: ${{ job.status }}
          QUERY_INPUT: ${{ github.event.inputs.query_input }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/notify.py
