name = "telegram-github-bridge"
main = "worker.js"
compatibility_date = "2024-01-01"

# Environment variables can be set via the Cloudflare Dashboard or
# using the `wrangler secret put VARIABLE_NAME` command.
# The values below are examples — never enter real values here!

# [vars]
# GITHUB_REPO = "your-username/your-repo-name"
# ALLOWED_CHAT_ID = "123456789"
# 
# Sensitive values (must be set as secrets):
# TELEGRAM_BOT_TOKEN → wrangler secret put TELEGRAM_BOT_TOKEN
# GITHUB_TOKEN       → wrangler secret put GITHUB_TOKEN
